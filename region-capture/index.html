<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Region Capture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  cursor: crosshair;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
canvas#displayCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}
#toolbar {
  display: none;
  position: fixed;
  z-index: 10;
  background: rgba(42, 42, 42, 0.94);
  border-radius: 8px;
  padding: 4px 6px;
  gap: 2px;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.toolbar-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: #ccc;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.toolbar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.toolbar-btn.active { background: rgba(255,215,0,0.2); color: #FFD700; }
.toolbar-btn.confirm { color: #4ade80; }
.toolbar-btn.confirm:hover { background: rgba(74,222,128,0.15); color: #4ade80; }
.toolbar-btn.cancel { color: #f87171; }
.toolbar-btn.cancel:hover { background: rgba(248,113,113,0.15); color: #f87171; }
.toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.15); margin: 0 4px; }
.tool-label {
  font-size: 11px;
  color: #888;
  padding: 0 4px;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<canvas id="displayCanvas"></canvas>
<div id="toolbar">
  <span class="tool-label">TOOLS</span>
  <button class="toolbar-btn active" data-tool="select" title="Select / Move">↖</button>
  <button class="toolbar-btn" data-tool="pencil" title="Pencil">✎</button>
  <button class="toolbar-btn" data-tool="shape" title="Rectangle">□</button>
  <button class="toolbar-btn" data-tool="eraser" title="Eraser">⌫</button>
  <span class="toolbar-sep"></span>
  <button class="toolbar-btn confirm" id="confirmBtn" title="Confirm">✓</button>
  <button class="toolbar-btn cancel" id="cancelBtn" title="Cancel">✕</button>
</div>
<script src="capture.js"></script>
</body>
</html>
