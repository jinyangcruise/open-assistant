<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      -webkit-user-select: none;
      user-select: none;
      border: 3px solid #ff4444;
    }

    .overlay-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 240px;
      height: 44px;
      padding: 0 14px;
      background: rgba(30, 30, 30, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    #debugInfo {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 10px;
      color: #ff4444;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 1px 4px;
      line-height: 1.4;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
    }

    .left-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    .cancel-btn {
      font-family: inherit;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cancel-btn:hover {
      background: rgba(255, 70, 70, 0.25);
      border-color: rgba(255, 70, 70, 0.4);
      color: #fff;
    }

    .cancel-btn:active {
      background: rgba(255, 70, 70, 0.35);
    }
  </style>
</head>
<body>
  <div class="overlay-bar">
    <div class="left-section">
      <div class="spinner"></div>
      <span class="status-text">AI生成中...</span>
    </div>
    <button class="cancel-btn" id="cancelBtn">取消</button>
  </div>
  <div id="debugInfo">Loading...</div>
  <script src="overlay.js"></script>
</body>
</html>
